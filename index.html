<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather </title>
  <link rel="stylesheet" href="main.css" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-wrap">
    <h1 style="text-decoration: underline;">WEATHER WEBSITE🌤️</h1>
    <header>
      <h2 style="color: white;">ENTER THE CITY NAME HERE: </h2>
      <BR><input type="text" autocomplete="off" class="search-box" style="font-weight:bold" placeholder ="Search for a city..." /></BR>
    </header>
    <main>
      <section class="location">
        <div class="city"></div>
        <div class="date"></div>
      </section>
      <div class="current">
        <div class="temp"><span></span></div>
        <div class="weather"></div>
        <div class="hi-low"></div>
      </div>
    </main>
  </div>
  <script src="main.js"></script>

</body>
</html>
